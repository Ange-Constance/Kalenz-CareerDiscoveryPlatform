version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: karrerlenz
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build: ./ml-service
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL_ID: ${HF_MODEL_ID:-Ange-Constance/karrelenz-career-classifier}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/karrerlenz
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ML_SERVICE_URL: http://ml-service:5000
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-angeconstance400@gmail.com}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    command: sh -c "node src/db/migrate.js && node src/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend

volumes:
  postgres_data:
